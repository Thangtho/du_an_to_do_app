<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow – Đăng nhập</title>
<!--
  index.html – Nguyễn Đức Minh
  Nhiệm vụ: UI trang Đăng nhập & Đăng ký + call API từ Thắng
-->
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --card: #1e2230; --border: #2a2f42;
    --accent: #5b7fff; --accent2: #a78bfa;
    --success: #34d399; --danger: #f87171;
    --text: #e8eaf0; --muted: #8892aa;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:var(--sans);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(91,127,255,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(91,127,255,.04) 1px,transparent 1px);
    background-size:40px 40px;
    animation:gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { transform:translateY(40px); } }
  .blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:.15; pointer-events:none; }
  .blob-1 { width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation:f1 8s ease-in-out infinite; }
  .blob-2 { width:300px;height:300px;background:var(--accent2);bottom:-80px;right:-80px;animation:f2 10s ease-in-out infinite; }
  @keyframes f1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
  @keyframes f2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

  .container { position:relative;z-index:1;width:100%;max-width:460px;padding:24px; }
  .logo { text-align:center;margin-bottom:32px; }
  .logo-icon {
    display:inline-flex;align-items:center;justify-content:center;
    width:56px;height:56px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:16px;font-size:28px;margin-bottom:12px;
    box-shadow:0 8px 32px rgba(91,127,255,.35);
  }
  .logo h1 { font-family:var(--mono);font-size:22px;letter-spacing:2px; }
  .logo p  { color:var(--muted);font-size:13px;margin-top:4px; }

  .card {
    background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.4);
    animation:slideUp .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .tabs { display:flex;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px; }
  .tab {
    flex:1;padding:10px;border:none;background:none;color:var(--muted);
    font-family:var(--sans);font-size:14px;font-weight:500;border-radius:9px;cursor:pointer;transition:all .25s;
  }
  .tab.active { background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3); }

  .form { display:none; }
  .form.active { display:block;animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .form-group { margin-bottom:18px; }
  label {
    display:block;font-size:12px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-family:var(--mono);
  }
  input {
    width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:12px 16px;color:var(--text);font-family:var(--sans);font-size:15px;
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  input:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,127,255,.15); }
  input::placeholder { color:var(--muted);opacity:.6; }

  .btn-submit {
    width:100%;padding:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:12px;color:#fff;
    font-family:var(--sans);font-size:15px;font-weight:600;
    cursor:pointer;margin-top:8px;transition:all .25s;overflow:hidden;
  }
  .btn-submit:hover  { transform:translateY(-2px);box-shadow:0 8px 24px rgba(91,127,255,.4); }
  .btn-submit:active { transform:translateY(0); }
  .btn-submit:disabled { opacity:.6;cursor:not-allowed;transform:none; }
  .spinner {
    display:none;width:18px;height:18px;
    border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .btn-submit.loading .spinner  { display:block; }
  .btn-submit.loading .btn-text { display:none; }

  .alert {
    padding:12px 16px;border-radius:10px;font-size:14px;
    margin-bottom:16px;display:none;animation:fadeIn .3s ease;
  }
  .alert.error   { background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--danger); }
  .alert.success { background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--success); }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">✓</div>
    <h1>TASKFLOW</h1>
    <p>Hệ thống quản lý công việc</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Đăng nhập</button>
      <button class="tab"        onclick="switchTab('register')">Đăng ký</button>
    </div>

    <!-- Form Đăng nhập – gọi API /api/login của Thắng -->
    <div class="form active" id="loginForm">
      <div class="alert" id="loginAlert"></div>
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text"     id="loginUsername" placeholder="Nhập tên đăng nhập" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Đăng nhập</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- Form Đăng ký – gọi API /api/register của Thắng -->
    <div class="form" id="registerForm">
      <div class="alert" id="registerAlert"></div>
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text"     id="regUsername" placeholder="Tạo tên đăng nhập">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email"    id="regEmail"    placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự">
      </div>
      <button class="btn-submit" id="registerBtn" onclick="handleRegister()">
        <span class="btn-text">Tạo tài khoản</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>
</div>

<script>
  /* ── Nguyễn Đức Minh – logic xử lý form đăng nhập / đăng ký ── */

  // Nếu đã có token → thẳng vào dashboard
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
    );
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  }

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className   = `alert ${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  function setLoading(btn, on) {
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  /* Đăng nhập – gọi POST /api/login (API của Thắng) */
  async function handleLogin() {
    const btn      = document.getElementById('loginBtn');
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
      showAlert('loginAlert', 'Vui lòng điền đầy đủ thông tin', 'error');
      return;
    }
    setLoading(btn, true);
    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        showAlert('loginAlert', 'Đăng nhập thành công! Đang chuyển...', 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } else {
        showAlert('loginAlert', data.error || 'Đăng nhập thất bại', 'error');
      }
    } catch {
      showAlert('loginAlert', 'Lỗi kết nối server', 'error');
    }
    setLoading(btn, false);
  }

  /* Đăng ký – gọi POST /api/register (API của Thắng) */
  async function handleRegister() {
    const btn      = document.getElementById('registerBtn');
    const username = document.getElementById('regUsername').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!username || !email || !password) {
      showAlert('registerAlert', 'Vui lòng điền đầy đủ thông tin', 'error');
      return;
    }
    setLoading(btn, true);
    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        showAlert('registerAlert', 'Đăng ký thành công!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } else {
        showAlert('registerAlert', data.error || 'Đăng ký thất bại', 'error');
      }
    } catch {
      showAlert('registerAlert', 'Lỗi kết nối server', 'error');
    }
    setLoading(btn, false);
  }

  // Bấm Enter để submit
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginForm').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
